version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: inventiq-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: inventiq
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inventiq"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: inventiq-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
    container_name: inventiq-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:admin@postgres:5432/inventiq?schema=public
      REDIS_URL: redis://redis:6379
      # Pull application secrets from the host environment or an env file at compose startup.
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      APP_USER: ${APP_USER:?APP_USER is required}
      APP_PASS_HASH: ${APP_PASS_HASH:?APP_PASS_HASH is required}
      PORT: 5001
      NODE_ENV: production
      GEMINI_API_KEY: ${GEMINI_API_KEY:?GEMINI_API_KEY is required}
      GEMINI_MODEL: ${GEMINI_MODEL:-gemini-2.5-flash}
    ports:
      - "5001:5001"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:5001/api/health').then((res)=>process.exit(res.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: /api
    container_name: inventiq-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
